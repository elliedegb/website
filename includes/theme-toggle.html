<!-- BUTTON (HTML OUTSIDE SCRIPT) -->
<button id="theme-toggle" class="theme-toggle">
  <img id="theme-icon" src="images/moon.png" alt="theme icon">
</button>

<!-- SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  const toggle = document.getElementById("theme-toggle");
  const icon = document.getElementById("theme-icon");

  // IMPORTANT: prevents silent failure
  if (!toggle || !icon) {
    console.log("Theme toggle not found in this page");
    return;
  }

  function setIcon(isDark) {
    icon.src = isDark ? "images/sun.png" : "images/moon.png";
  }

  const isDark = localStorage.getItem("theme") === "dark";

  if (isDark) {
    document.body.classList.add("dark-mode");
  }

  setIcon(isDark);

  toggle.addEventListener("click", () => {

    document.body.classList.toggle("dark-mode");

    const nowDark = document.body.classList.contains("dark-mode");

    localStorage.setItem("theme", nowDark ? "dark" : "light");

    setIcon(nowDark);
  });

});
</script>
